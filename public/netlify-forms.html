<!-- Hidden forms for Netlify Forms detection -->
<!-- These are never displayed, just used so Netlify can detect form names at build time -->

<form name="chat-lead" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <input type="text" name="question" />
  <input type="text" name="answer" />
</form>

<form name="search-lead" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <input type="text" name="question" />
  <input type="text" name="answer" />
</form>

<form name="quote-request" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="equipment" />
  <input type="text" name="projectType" />
  <input type="text" name="projectLocation" />
  <input type="text" name="zipCode" />
  <input type="text" name="startDate" />
  <input type="text" name="duration" />
  <input type="text" name="deliveryPreference" />
  <input type="text" name="companyName" />
  <input type="text" name="contactName" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <input type="text" name="hearAboutUs" />
  <textarea name="notes"></textarea>
  <input type="checkbox" name="needDvbeDocs" />
</form>
